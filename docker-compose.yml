version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    network_mode: "host"

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    restart: always
    volumes:
      - ./n8n-data:/home/node/.n8n
    network_mode: "host"
